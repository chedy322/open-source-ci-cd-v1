
# changes → security → build (both images with same SHA)
#                          ↓
#                    test (via nginx using docker-compose)
name: Ci/cd Pipeline for web and nginx

on:
  push:
    branches: ["master"]
    paths_ignore: [".md"]

permissions:
  contents: read      
  security-events: write 
  actions: write


env:
  node_version: 20
  web_image: mywebappnode
  nginx_image: mynginxnode

jobs:
  # Check if modifications were made in the web or the nginx
  changes:
      name: Track changes made to folders
      runs-on: ubuntu-latest
      outputs: 
        web: ${{steps.filter.outputs.web}}
        nginx: ${{steps.filter.outputs.nginx}}
      steps:
        - name : Checkout code repo
          uses: actions/checkout@v4

        - name: Track changes in files
          uses: dorny/paths-filter@v3
          id: filter 
          with: 
            filters: |
              web:
                - 'web/**'
                - 'package*.json'
              nginx:
                - 'nginx/**'

  # run secrets tests
  GitGuadian:
      runs-on: ubuntu-latest
      environment: staging
      steps:
      - name: Checkout the code repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: GitGuardian scan
        uses: GitGuardian/ggshield/actions/secret@v1.48.0
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # run tests for the packajson

  security:
    needs: [changes,GitGuadian]
    environment: staging
    if: ${{needs.changes.outputs.web=='true'}} && success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk to check for vulnerabilities

        uses: snyk/actions/node@v4
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # promote to prod
  # use differnet workflow for cd
  # finish from chatgpt concversation for improvements
  docker-build:
    needs: [security,GitGuadian,changes]
    if: ${{needs.changes.outputs.web =='true'}} || ${{needs.changes.outputs.nginx=='true'}}
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      image_sha: ${{steps.ImageTag.outputs.githubsha}}
    steps:
      # log into docker
       -  name: Login to Docker Hub
          uses: docker/login-action@v4
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

       -  name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4
      
       -   name: Genrate ssh for the image
           id: ImageTag
           run: echo "githubsha=${{github.sha}}"  >> "$GITHUB_OUTPUT"


       -  name: Build web app image 
          # if: ${{needs.changes.outputs.web=='true'}}
          uses:  docker/build-push-action@v7
          with:
            context: ./web
            push: true
            tags: |
                  docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ env.web_image }}:${{ steps.ImageTag.outputs.githubsha }}
              
            cache-from: type=gha
            cache-to: type=gha,mode=max
            


      # build the nginx image
       -  name: Build nginx image
          # if: ${{needs.changes.outputs.nginx=='true'}}
          uses:  docker/build-push-action@v7
          with:
            context: ./nginx
            push: true
            cache-from: type=gha
            cache-to: type=gha,mode=max
            tags: |
                   docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ env.nginx_image }}:${{ steps.ImageTag.outputs.githubsha }}

  test-images:
    needs: [docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Run services
        run: |
          DOCKERHUB_USERNAME=${{vars.DOCKERHUB_USERNAME}} WEB_IMAGE_NAME=${{env.web_image}} NGINX_IMAGE_NAME=${{env.nginx_image}} GITHUB_SHA=${{needs.docker-build.outputs.image_sha}} docker compose -f compose.yml up -d   
      - name: Health check
        run: |
          for i in {1...5}; do
            curl http://localhost:80 && exit 0
            sleep 2
          done
          exit 1
           
      - name: Clean up
        if: always()
        run: docker compose down
  CD-trigger:
    runs-on: ubuntu-latest
    needs: [test-images,docker-build]
    steps:
      - name: Trigger dispatch event
        uses: peter-evans/repository-dispatch@v4
        with:
          event: cd-dispatch-event
          token: ${{secrets.GITHUB_ACTIONS}}
          client-payload: |
            {
              sha: ${{needs.docker-build.outputs.image_sha}}
            }

  
 


      




